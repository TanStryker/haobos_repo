<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>我的信息 - HRMS</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
    <script src="/ui/assets/app.js" defer></script>
  </head>
  <body>
    <header><div id="nav"></div></header>
    <div class="container">
      <div class="card">
        <h2>个人信息查看</h2>
        <div id="msg" class="hint"></div>
        <pre id="data"></pre>
      </div>
      <div class="card">
        <h2>修改密码</h2>
        <div class="row">
          <div><label>原密码</label><input id="oldp" type="password" /></div>
          <div><label>新密码</label><input id="newp" type="password" /></div>
          <div style="align-self:flex-end;"><button class="btn primary" id="btn_cp">修改</button></div>
        </div>
        <div id="cp_msg" class="hint" style="margin-top:8px;"></div>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        if (!requireRole(["employee"])) return;
        const msg = document.getElementById("msg");
        try {
          const data = await api("/me/employee");
          msg.className = "ok";
          msg.textContent = "加载成功";
          document.getElementById("data").textContent = JSON.stringify(data, null, 2);
        } catch (e) {
          msg.className = "error";
          msg.textContent = e.message;
        }
        document.getElementById("btn_cp").addEventListener("click", async () => {
          const cpMsg = document.getElementById("cp_msg");
          cpMsg.className = "hint";
          cpMsg.textContent = "";
          try {
            await api("/auth/change-password", {
              method: "POST",
              body: JSON.stringify({ old_password: document.getElementById("oldp").value, new_password: document.getElementById("newp").value })
            });
            cpMsg.className = "ok";
            cpMsg.textContent = "修改成功";
          } catch (e) {
            cpMsg.className = "error";
            cpMsg.textContent = e.message;
          }
        });
      });
    </script>
  </body>
</html>
