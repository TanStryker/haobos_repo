<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>系统-配置 - HRMS</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
    <script src="/ui/assets/app.js" defer></script>
  </head>
  <body>
    <header><div id="nav"></div></header>
    <div class="container">
      <div class="card">
        <h2>系统配置</h2>
        <button class="btn primary" id="btn_load">加载</button>
        <pre id="data"></pre>
      </div>
      <div class="card">
        <h2>设置配置</h2>
        <div class="row">
          <div><label>Key</label><input id="key" /></div>
          <div style="flex:1; min-width:260px;"><label>Value</label><input id="value" style="min-width:260px; width:100%;" /></div>
          <div style="align-self:flex-end;"><button class="btn primary" id="btn_set">保存</button></div>
        </div>
        <div id="msg" class="hint" style="margin-top:8px;"></div>
      </div>
    </div>
    <script>
      async function load() {
        const data = await api("/admin/config");
        document.getElementById("data").textContent = JSON.stringify(data, null, 2);
      }
      document.addEventListener("DOMContentLoaded", async () => {
        if (!requireRole(["admin"])) return;
        document.getElementById("btn_load").addEventListener("click", load);
        document.getElementById("btn_set").addEventListener("click", async () => {
          const msg = document.getElementById("msg");
          msg.className = "hint";
          msg.textContent = "";
          try {
            await api("/admin/config", { method: "POST", body: JSON.stringify({ key: document.getElementById("key").value.trim(), value: document.getElementById("value").value.trim() }) });
            msg.className = "ok";
            msg.textContent = "保存成功";
            await load();
          } catch (e) {
            msg.className = "error";
            msg.textContent = e.message;
          }
        });
        await load();
      });
    </script>
  </body>
</html>
