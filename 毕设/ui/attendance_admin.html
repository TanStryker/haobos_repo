<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>出勤管理 - HRMS</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
    <link rel="stylesheet" href="/ui/assets/vendor/leaflet/leaflet.css" />
    <script src="/ui/assets/vendor/leaflet/leaflet.js"></script>
    <script src="/ui/assets/app.js" defer></script>
  </head>
  <body>
    <header><div id="nav"></div></header>
    <div class="container">
      <div class="card">
        <h2>出勤数据同步（占位）</h2>
        <div class="row">
          <div><label>开始日期</label><input id="sd" placeholder="2026-04-01" /></div>
          <div><label>结束日期</label><input id="ed" placeholder="2026-04-30" /></div>
        </div>
        <div style="margin-top:10px;">
          <label>records (JSON数组，可留空)</label>
          <textarea id="records" placeholder='[{"employee_id":"1001","ts":"2026-04-01T09:00:00","status":"present"}]'></textarea>
        </div>
        <div style="margin-top:10px;">
          <button class="btn primary" id="btn_sync">同步</button>
          <span id="msg" class="hint"></span>
        </div>
      </div>

      <div class="card">
        <h2>考勤规则设置</h2>
        <div class="row">
          <div>
            <label>规则选择</label>
            <select id="r_rule_select" style="min-width:320px;"></select>
          </div>
          <div style="align-self:flex-end;">
            <button class="btn" id="btn_rule_refresh">刷新列表</button>
            <button class="btn" id="btn_rule_new">新建规则</button>
            <button class="btn danger" id="btn_rule_delete">删除规则</button>
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <div>
            <label>启用</label>
            <select id="r_enabled">
              <option value="true">启用</option>
              <option value="false">停用</option>
            </select>
          </div>
          <div>
            <label>适用人员</label>
            <select id="r_work_type">
              <option value="onsite">驻场</option>
              <option value="offsite">外派</option>
            </select>
          </div>
          <div><label>优先级(越小越优先)</label><input id="r_priority" type="number" value="100" /></div>
          <div><label>规则名称</label><input id="r_name" value="默认规则" /></div>
          <div><label>打卡开始时间(HH:MM)</label><input id="r_start" value="09:00" /></div>
          <div><label>打卡结束时间(HH:MM)</label><input id="r_end" value="10:00" /></div>
        </div>
        <div class="row" style="margin-top:10px;">
          <div><label>中心纬度(可选)</label><input id="r_lat" /></div>
          <div><label>中心经度(可选)</label><input id="r_lng" /></div>
          <div><label>允许半径(米，可选)</label><input id="r_radius" type="number" /></div>
          <div style="flex:1; min-width:260px;"><label>地点提示(可选)</label><input id="r_hint" style="min-width:260px; width:100%;" /></div>
          <div style="align-self:flex-end;">
            <button class="btn primary" id="btn_rule_save">保存规则</button>
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <div style="align-self:flex-end;">
            <button class="btn" id="btn_pick_point">地图选点</button>
            <button class="btn" id="btn_clear_point">清除地点限制</button>
          </div>
          <div class="hint" style="align-self:center;">在地图上点击即可填充中心点坐标；半径用于限制可打卡范围</div>
        </div>
        <div id="map_wrap" style="margin-top:10px; display:none;">
          <div id="map" style="height:360px; border:1px solid #e6e7ee; border-radius:10px;"></div>
        </div>
        <div id="rule_msg" class="hint" style="margin-top:8px;"></div>
      </div>

      <div class="card">
        <h2>打卡记录查看</h2>
        <div class="row">
          <div><label>员工工号(可选)</label><input id="eid" /></div>
          <div><label>月份(可选)</label><input id="month" placeholder="2026-04" /></div>
          <div style="align-self:flex-end;"><button class="btn primary" id="btn_load">查询</button></div>
        </div>
        <div style="max-height:420px; overflow:auto; margin-top:10px;">
          <table>
            <thead><tr><th>员工</th><th>时间</th><th>状态</th><th>来源</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>出勤数据调整</h2>
        <div class="row">
          <div><label>员工工号</label><input id="a_eid" /></div>
          <div><label>时间</label><input id="a_ts" placeholder="2026-04-01T09:00:00" /></div>
          <div><label>状态</label><input id="a_status" value="present" /></div>
          <div style="align-self:flex-end;"><button class="btn primary" id="btn_adjust">调整</button></div>
        </div>
      </div>

      <div class="card">
        <h2>出勤统计</h2>
        <div class="row">
          <div><label>月份 (YYYY-MM)</label><input id="s_month" placeholder="2026-04" /></div>
          <div style="align-self:flex-end;"><button class="btn primary" id="btn_stats">统计</button></div>
        </div>
        <pre id="stats"></pre>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        if (!requireRole(["admin"])) return;
        let map = null;
        let marker = null;
        let currentRuleId = null;
        let ruleItems = [];

        const parseNum = (v) => {
          const s = String(v || "").trim();
          if (!s) return null;
          const n = Number(s);
          if (!Number.isFinite(n)) return null;
          return n;
        };

        const ensureMap = () => {
          const wrap = document.getElementById("map_wrap");
          wrap.style.display = "";
          if (map) return;
          if (!window.L) {
            const m = document.getElementById("rule_msg");
            m.className = "error";
            m.textContent = "地图组件加载失败，请检查 /ui/assets/vendor/leaflet/ 是否存在";
            return;
          }
          map = L.map("map").setView([39.9042, 116.4074], 12);

          const offlineTiles = L.tileLayer("/ui/tiles/{z}/{x}/{y}.png", {
            maxZoom: 19,
            attribution: "离线瓦片"
          });
          const gaodeStandardTiles = L.tileLayer("https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=7&x={x}&y={y}&z={z}", {
            subdomains: ["1", "2", "3", "4"],
            maxZoom: 19,
            attribution: "高德地图"
          });
          const gaodeSatelliteTiles = L.tileLayer("https://webst0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=6&x={x}&y={y}&z={z}", {
            subdomains: ["1", "2", "3", "4"],
            maxZoom: 19,
            attribution: "高德卫星"
          });
          const gaodeLabelTiles = L.tileLayer("https://webst0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}", {
            subdomains: ["1", "2", "3", "4"],
            maxZoom: 19,
            attribution: "高德注记"
          });

          const baseLayers = {
            "高德卫星（推荐）": gaodeSatelliteTiles,
            "高德标准": gaodeStandardTiles,
            "离线瓦片": offlineTiles
          };
          const overlayLayers = {
            "路网注记": gaodeLabelTiles
          };

          const ruleMsg = document.getElementById("rule_msg");
          const probeOffline = async () => {
            try {
              const r = await fetch("/ui/tiles/12/3371/1551.png", { method: "HEAD", cache: "no-store" });
              return r.ok;
            } catch (_) {
              return false;
            }
          };

          const initLayers = async () => {
            const hasOffline = await probeOffline();
            const defaultLayer = hasOffline ? offlineTiles : gaodeSatelliteTiles;
            defaultLayer.addTo(map);
            if (!hasOffline) {
              gaodeLabelTiles.addTo(map);
            }
            L.control.layers(baseLayers, overlayLayers, { collapsed: true }).addTo(map);
            if (!hasOffline) {
              ruleMsg.className = "hint";
              ruleMsg.textContent = "未检测到离线瓦片（/ui/tiles），已使用高德卫星底图；如需离线，请将瓦片放到 毕设/ui/tiles/{z}/{x}/{y}.png";
            }
          };

          const showTileErrorHint = (msg) => {
            ruleMsg.className = "error";
            ruleMsg.textContent = msg;
          };
          offlineTiles.on("tileerror", () => showTileErrorHint("离线瓦片不存在或路径不对：请将瓦片放到 毕设/ui/tiles/{z}/{x}/{y}.png"));
          gaodeStandardTiles.on("tileerror", () => showTileErrorHint("高德在线瓦片加载失败：请检查网络/代理/防火墙，或改用离线瓦片"));
          gaodeSatelliteTiles.on("tileerror", () => showTileErrorHint("高德卫星瓦片加载失败：请检查网络/代理/防火墙，或改用离线瓦片"));
          gaodeLabelTiles.on("tileerror", () => showTileErrorHint("高德注记瓦片加载失败：请检查网络/代理/防火墙，或改用离线瓦片"));
          initLayers();

          map.on("click", (e) => {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            document.getElementById("r_lat").value = String(lat.toFixed(6));
            document.getElementById("r_lng").value = String(lng.toFixed(6));
            updateMarkerFromInputs(true);
          });
          updateMarkerFromInputs(false);
        };

        const updateMarkerFromInputs = (pan) => {
          if (!map) return;
          const lat = parseNum(document.getElementById("r_lat").value);
          const lng = parseNum(document.getElementById("r_lng").value);
          if (lat == null || lng == null) {
            if (marker) {
              map.removeLayer(marker);
              marker = null;
            }
            return;
          }
          const ll = [lat, lng];
          if (!marker) {
            marker = L.circleMarker(ll, { radius: 8, color: "#1f3b8a", fillColor: "#1f3b8a", fillOpacity: 0.35, weight: 2 }).addTo(map);
          } else {
            marker.setLatLng(ll);
          }
          if (pan) {
            map.setView(ll, Math.max(map.getZoom(), 15));
          }
        };

        const workTypeLabel = (v) => (v === "offsite" ? "外派" : "驻场");
        const setFormRule = (rule) => {
          currentRuleId = rule && rule.id ? rule.id : null;
          document.getElementById("r_enabled").value = String(!!(rule && rule.enabled));
          document.getElementById("r_work_type").value = (rule && rule.work_type) || "onsite";
          document.getElementById("r_priority").value = rule && rule.priority != null ? String(rule.priority) : "100";
          document.getElementById("r_name").value = (rule && rule.name) || "";
          document.getElementById("r_start").value = (rule && rule.start_time) || "";
          document.getElementById("r_end").value = (rule && rule.end_time) || "";
          document.getElementById("r_lat").value = rule && rule.center_lat == null ? "" : String(rule.center_lat);
          document.getElementById("r_lng").value = rule && rule.center_lng == null ? "" : String(rule.center_lng);
          document.getElementById("r_radius").value = rule && rule.allowed_radius_m == null ? "" : String(rule.allowed_radius_m);
          document.getElementById("r_hint").value = (rule && rule.address_hint) || "";
          updateMarkerFromInputs(true);
        };

        const refreshSelect = () => {
          const sel = document.getElementById("r_rule_select");
          sel.innerHTML = "";
          for (const r of ruleItems) {
            const opt = document.createElement("option");
            opt.value = r.id;
            const enabledText = r.enabled ? "启用" : "停用";
            opt.textContent = `${workTypeLabel(r.work_type)} | P${r.priority ?? 100} | ${enabledText} | ${r.name || ""}`;
            sel.appendChild(opt);
          }
          if (ruleItems.length === 0) {
            const opt = document.createElement("option");
            opt.value = "";
            opt.textContent = "暂无规则，请新建";
            sel.appendChild(opt);
          }
        };

        const loadRules = async (keepId) => {
          const m = document.getElementById("rule_msg");
          m.className = "hint";
          m.textContent = "加载中...";
          try {
            const data = await api("/admin/attendance/rules");
            ruleItems = data.items || [];
            refreshSelect();
            const sel = document.getElementById("r_rule_select");
            let targetId = keepId || currentRuleId;
            if (targetId && ruleItems.some(r => r.id === targetId)) {
              sel.value = targetId;
            } else if (ruleItems.length > 0) {
              sel.value = ruleItems[0].id;
              targetId = ruleItems[0].id;
            } else {
              targetId = null;
            }
            const selected = ruleItems.find(r => r.id === targetId) || null;
            if (selected) {
              setFormRule(selected);
            } else {
              setFormRule({ enabled: false, work_type: "onsite", priority: 100, name: "默认规则", start_time: "09:00", end_time: "10:00" });
            }
            m.className = "ok";
            m.textContent = "加载成功";
          } catch (e) {
            m.className = "error";
            m.textContent = e.message;
          }
        };

        const saveRule = async () => {
          const m = document.getElementById("rule_msg");
          m.className = "hint";
          m.textContent = "保存中...";
          try {
            const enabled = document.getElementById("r_enabled").value === "true";
            const work_type = document.getElementById("r_work_type").value;
            const priority = Number(document.getElementById("r_priority").value || 100);
            const payload = {
              enabled,
              work_type,
              priority,
              name: document.getElementById("r_name").value.trim() || "默认规则",
              start_time: document.getElementById("r_start").value.trim(),
              end_time: document.getElementById("r_end").value.trim(),
              center_lat: document.getElementById("r_lat").value.trim() === "" ? null : Number(document.getElementById("r_lat").value),
              center_lng: document.getElementById("r_lng").value.trim() === "" ? null : Number(document.getElementById("r_lng").value),
              allowed_radius_m: document.getElementById("r_radius").value.trim() === "" ? null : Number(document.getElementById("r_radius").value),
              address_hint: document.getElementById("r_hint").value.trim(),
            };
            if (currentRuleId) {
              await api(`/admin/attendance/rules/${encodeURIComponent(currentRuleId)}`, { method: "PUT", body: JSON.stringify(payload) });
            } else {
              const created = await api("/admin/attendance/rules", { method: "POST", body: JSON.stringify(payload) });
              currentRuleId = created.id;
            }
            m.className = "ok";
            m.textContent = "保存成功";
            await loadRules(currentRuleId);
          } catch (e) {
            m.className = "error";
            m.textContent = e.message;
          }
        };

        document.getElementById("btn_rule_refresh").addEventListener("click", () => loadRules(currentRuleId));
        document.getElementById("btn_rule_save").addEventListener("click", saveRule);
        document.getElementById("btn_rule_new").addEventListener("click", () => {
          const sel = document.getElementById("r_rule_select");
          sel.value = "";
          setFormRule({ enabled: true, work_type: "onsite", priority: 100, name: "新规则", start_time: "09:00", end_time: "10:00" });
          currentRuleId = null;
        });
        document.getElementById("btn_rule_delete").addEventListener("click", async () => {
          if (!currentRuleId) return;
          if (!confirm("确认删除该规则？")) return;
          try {
            await api(`/admin/attendance/rules/${encodeURIComponent(currentRuleId)}?confirm=true`, { method: "DELETE" });
            currentRuleId = null;
            await loadRules(null);
          } catch (e) {
            const m = document.getElementById("rule_msg");
            m.className = "error";
            m.textContent = e.message;
          }
        });
        document.getElementById("r_rule_select").addEventListener("change", (e) => {
          const id = e.target.value;
          const r = ruleItems.find(x => x.id === id);
          if (r) setFormRule(r);
        });
        document.getElementById("btn_pick_point").addEventListener("click", () => {
          ensureMap();
          updateMarkerFromInputs(true);
        });
        document.getElementById("btn_clear_point").addEventListener("click", () => {
          document.getElementById("r_lat").value = "";
          document.getElementById("r_lng").value = "";
          document.getElementById("r_radius").value = "";
          updateMarkerFromInputs(false);
        });
        document.getElementById("r_lat").addEventListener("change", () => updateMarkerFromInputs(true));
        document.getElementById("r_lng").addEventListener("change", () => updateMarkerFromInputs(true));
        await loadRules(null);

        document.getElementById("btn_sync").addEventListener("click", async () => {
          const msg = document.getElementById("msg");
          msg.className = "hint";
          msg.textContent = "同步中...";
          try {
            const sd = document.getElementById("sd").value.trim();
            const ed = document.getElementById("ed").value.trim();
            const raw = document.getElementById("records").value.trim();
            const records = raw ? JSON.parse(raw) : null;
            const data = await api("/admin/attendance/sync", { method: "POST", body: JSON.stringify({ start_date: sd, end_date: ed, records }) });
            msg.className = "ok";
            msg.textContent = `同步完成 inserted=${data.inserted}`;
          } catch (e) {
            msg.className = "error";
            msg.textContent = e.message;
          }
        });

        document.getElementById("btn_load").addEventListener("click", async () => {
          const eid = document.getElementById("eid").value.trim();
          const month = document.getElementById("month").value.trim();
          const params = new URLSearchParams();
          if (eid) params.set("employee_id", eid);
          if (month) params.set("month", month);
          const data = await api(`/admin/attendance/records?${params.toString()}`);
          const tbody = document.getElementById("tbody");
          tbody.innerHTML = "";
          for (const r of data.items || []) {
            const tr = document.createElement("tr");
            for (const v of [r.employee_id, r.ts, r.status, r.source]) {
              const td = document.createElement("td");
              td.textContent = v == null ? "" : String(v);
              tr.appendChild(td);
            }
            tbody.appendChild(tr);
          }
        });

        document.getElementById("btn_adjust").addEventListener("click", async () => {
          await api("/admin/attendance/adjust", {
            method: "POST",
            body: JSON.stringify({
              employee_id: document.getElementById("a_eid").value.trim(),
              ts: document.getElementById("a_ts").value.trim(),
              status: document.getElementById("a_status").value.trim(),
            })
          });
          alert("已提交调整");
        });

        document.getElementById("btn_stats").addEventListener("click", async () => {
          const month = document.getElementById("s_month").value.trim();
          const data = await api(`/admin/attendance/stats?month=${encodeURIComponent(month)}`);
          document.getElementById("stats").textContent = JSON.stringify(data, null, 2);
        });
      });
    </script>
  </body>
</html>
