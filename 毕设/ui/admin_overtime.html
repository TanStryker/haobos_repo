<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>加班审批 - HRMS</title>
    <link rel="stylesheet" href="/ui/assets/styles.css" />
    <script src="/ui/assets/app.js" defer></script>
  </head>
  <body>
    <header><div id="nav"></div></header>
    <div class="container">
      <div class="card">
        <h2>待审批加班申请</h2>
        <div id="msg" class="hint"></div>
        <div style="max-height:420px; overflow:auto; margin-top:10px;">
          <table>
            <thead>
              <tr><th>创建时间</th><th>员工</th><th>日期</th><th>天数</th><th>理由</th><th>操作</th></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>月度加班统计</h2>
        <div class="row">
          <div><label>月份 (YYYY-MM)</label><input id="month" placeholder="2026-04" /></div>
          <div style="align-self:flex-end;"><button class="btn primary" id="btn_stats">查询</button></div>
        </div>
        <pre id="stats"></pre>
      </div>
    </div>
    <script>
      function btn(label, cls, onClick) {
        const b = document.createElement("button");
        b.className = cls;
        b.type = "button";
        b.textContent = label;
        b.addEventListener("click", onClick);
        return b;
      }
      async function loadPending() {
        const msg = document.getElementById("msg");
        msg.className = "hint";
        msg.textContent = "加载中...";
        try {
          const data = await api("/admin/overtime/pending");
          const tbody = document.getElementById("tbody");
          tbody.innerHTML = "";
          for (const r of data.items || []) {
            const tr = document.createElement("tr");
            for (const v of [r.created_at, r.employee_id, r.date, r.days, r.reason]) {
              const td = document.createElement("td");
              td.textContent = v == null ? "" : String(v);
              tr.appendChild(td);
            }
            const ops = document.createElement("td");
            ops.appendChild(btn("通过", "btn primary", async () => { await api(`/admin/overtime/${r.id}/approve`, { method: "POST" }); await loadPending(); }));
            ops.appendChild(btn("驳回", "btn danger", async () => {
              const reason = prompt("驳回理由") || "";
              if (!reason.trim()) return;
              await api(`/admin/overtime/${r.id}/reject`, { method: "POST", body: JSON.stringify({ reason }) });
              await loadPending();
            }));
            tr.appendChild(ops);
            tbody.appendChild(tr);
          }
          msg.className = "ok";
          msg.textContent = `待审批 ${data.items ? data.items.length : 0} 条`;
        } catch (e) {
          msg.className = "error";
          msg.textContent = e.message;
        }
      }
      document.addEventListener("DOMContentLoaded", async () => {
        if (!requireRole(["admin"])) return;
        await loadPending();
        document.getElementById("btn_stats").addEventListener("click", async () => {
          const month = document.getElementById("month").value.trim();
          const data = await api(`/admin/overtime/stats?month=${encodeURIComponent(month)}`);
          document.getElementById("stats").textContent = JSON.stringify(data, null, 2);
        });
      });
    </script>
  </body>
</html>
